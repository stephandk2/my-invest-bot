name: Ledger Auto Update

on:
  schedule:
    - cron: '00 6 * * 1-5'  # 한국시간 15:00 (평일 장 마감)
    - cron: '00 22 * * 0-4' # 한국시간 07:00 (평일 개장 전)
  workflow_dispatch: # 깃허브 웹페이지에서 수동으로 버튼을 눌러 실행 가능

jobs:
  update-sheet:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 최신 버전(v4)의 checkout 사용
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 최신 버전(v5)의 setup-python 사용
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 필요한 파이썬 라이브러리 설치 (시트 읽기 기능 유지를 위해 기존 라이브러리 유지)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread yfinance oauth2client pytz beautifulsoup4

      # 4. 파이썬 스크립트 실행 (Gmail 연동 변수 추가 매핑)
      - name: Run Script
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          GSPREAD_JSON: ${{ secrets.GSPREAD_SERVICE_ACCOUNT }}
          # 🎯 [신규 추가] 파이썬 스크립트의 os.environ과 깃허브 Secrets 매핑
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py
