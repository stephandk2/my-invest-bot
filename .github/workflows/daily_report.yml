name: Daily Market Report
on:
  workflow_dispatch:
  schedule:
    - cron: '00 6 * * 1-5'  # 한국시간 15:00 (평일)
    - cron: '00 23 * * 0-4' # 한국시간 08:00 (평일)
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with: { python-version: '3.11' }
      - name: Run Script
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          GSPREAD_JSON: ${{ secrets.GSPREAD_SERVICE_ACCOUNT }}
        run: |
          pip install requests gspread oauth2client pytz yfinance
          python main.py
