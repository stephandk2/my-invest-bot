name: Ledger Auto Update

on:
  schedule:
    - cron: '00 6 * * 1-5'  # 한국시간 15:00 (평일)
    - cron: '00 22 * * 0-4' # 한국시간 07:00 (평일)
  workflow_dispatch: # 깃허브 웹페이지에서 수동으로 버튼을 눌러 실행할 수 있게 해줍니다.

jobs:
  update-sheet:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 최신 버전(v4)의 checkout 사용 (Node.js 20/24 경고 해결)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 최신 버전(v5)의 setup-python 사용 (Node.js 20/24 경고 해결)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 파이썬 3.10 환경 구성

      # 3. 필요한 파이썬 라이브러리 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread yfinance oauth2client pytz

      # 4. 파이썬 스크립트 실행 (환경 변수 매핑 필수)
      - name: Run Script
        env:
          # 깃허브 저장소 Settings -> Secrets에 등록해둔 변수들을 스크립트로 전달
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          GSPREAD_JSON: ${{ secrets.GSPREAD_JSON }}
        # 실행할 파이썬 파일 이름 (실제 파일 이름에 맞게 수정하세요. 예: main.py)
        run: python main.py
